<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexus Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;font-weight:600;color:#f1f5f9}
.status{font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.on{background:#22c55e}.dot.off{background:#ef4444}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg a{color:#60a5fa}
.msg b,.msg strong{font-weight:600}
.msg code{background:#334155;padding:1px 5px;border-radius:3px;font-size:13px}
.msg pre{background:#1e293b;padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0;font-size:13px}
.msg.user{background:#1d4ed8;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.assistant{background:#1e293b;border:1px solid #334155;align-self:flex-start;border-bottom-left-radius:4px}
.msg.system{background:transparent;color:#64748b;font-size:12px;align-self:center;text-align:center}
.typing{align-self:flex-start;color:#64748b;font-size:13px;padding:4px 14px}
.typing span{animation:blink 1.4s infinite;display:inline-block}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.input-area{background:#1e293b;border-top:1px solid #334155;padding:12px 20px;display:flex;gap:10px;flex-shrink:0}
.input-area input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
.input-area input:focus{border-color:#3b82f6}
.input-area input::placeholder{color:#475569}
.input-area button{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer}
.input-area button:hover{background:#2563eb}
.input-area button:disabled{background:#334155;cursor:not-allowed}
</style>
</head>
<body>
<header>
  <h1>Nexus</h1>
  <div class="status"><span class="dot off" id="statusDot"></span><span id="statusText">connecting...</span></div>
</header>
<div class="messages" id="messages">
  <div class="msg system">Type a message or use /help for commands</div>
</div>
<div class="input-area">
  <input type="text" id="input" placeholder="Message Nexus..." autocomplete="off">
  <button id="sendBtn" disabled>Send</button>
</div>
<script>
var ws,messagesEl=document.getElementById("messages"),input=document.getElementById("input"),sendBtn=document.getElementById("sendBtn"),statusDot=document.getElementById("statusDot"),statusText=document.getElementById("statusText");

function connect(){
  var proto=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(proto+"//"+location.host+"/ws/chat");
  ws.onopen=function(){statusDot.className="dot on";statusText.textContent="connected";sendBtn.disabled=false;};
  ws.onclose=function(){statusDot.className="dot off";statusText.textContent="disconnected";sendBtn.disabled=true;setTimeout(connect,3000);};
  ws.onerror=function(){ws.close();};
  ws.onmessage=function(e){
    var data=JSON.parse(e.data);
    if(data.type==="typing"){showTyping();return;}
    if(data.type==="message"){hideTyping();addMsg("assistant",data.text);}
  };
}

function addMsg(role,text){
  var div=document.createElement("div");
  div.className="msg "+role;
  if(role==="assistant"){div.innerHTML=mdToHtml(text);}
  else{div.textContent=text;}
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

function mdToHtml(t){
  t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  t=t.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");
  t=t.replace(/`([^`]+)`/g,"<code>$1</code>");
  t=t.replace(/\n/g,"<br>");
  return t;
}

function showTyping(){
  hideTyping();
  var div=document.createElement("div");
  div.className="typing";div.id="typingIndicator";
  div.innerHTML="<span>•</span><span>•</span><span>•</span>";
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function hideTyping(){var el=document.getElementById("typingIndicator");if(el)el.remove();}

function send(){
  var text=input.value.trim();
  if(!text||!ws||ws.readyState!==1)return;
  addMsg("user",text);
  ws.send(JSON.stringify({text:text,tenant_id:""}));
  input.value="";
}

input.addEventListener("keydown",function(e){if(e.key==="Enter")send();});
sendBtn.addEventListener("click",send);
connect();
</script>
</body>
</html>
