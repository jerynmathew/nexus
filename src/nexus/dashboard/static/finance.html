<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance — Nexus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.wrap{max-width:1060px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:20px;font-weight:700;color:#f1f5f9}
h2{font-size:15px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px}
.meta{font-size:12px;color:#64748b}
.topbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}
.kpi-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:#f1f5f9}
.kpi-sub{font-size:12px;margin-top:2px}
.green{color:#22c55e}.red{color:#ef4444}.amber{color:#f59e0b}
.panel{background:#1e293b;border-radius:12px;border:1px solid #334155;padding:20px;margin-bottom:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#94a3b8;font-weight:600;border-bottom:1px solid #334155;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid #1e293b}
tr:hover td{background:#162032}
.alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.alloc-bar{height:20px;border-radius:4px;min-width:4px;transition:width .3s}
.alloc-label{font-size:12px;min-width:60px}
.alloc-pct{font-size:12px;color:#94a3b8;min-width:50px;text-align:right}
.alloc-val{font-size:11px;color:#64748b;min-width:90px;text-align:right}
.fire-bar-bg{background:#334155;border-radius:8px;height:24px;position:relative;margin:8px 0}
.fire-bar-fill{background:linear-gradient(90deg,#3b82f6,#22c55e);height:100%;border-radius:8px;transition:width .5s}
.fire-bar-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600;color:#fff}
.empty{text-align:center;padding:32px;color:#475569;font-size:13px}
.disclaimer{font-size:11px;color:#475569;margin-top:20px;text-align:center;font-style:italic}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Finance Dashboard</h1>
    <span class="meta" id="lastUpdated">loading...</span>
  </header>

  <div class="topbar" id="kpis"><div class="empty">Loading...</div></div>

  <h2>Asset Allocation</h2>
  <div class="panel" id="allocation"><div class="empty">Loading...</div></div>

  <h2>FIRE Progress</h2>
  <div class="panel" id="fire"><div class="empty">Loading...</div></div>

  <h2>Holdings</h2>
  <div class="panel" id="holdings"><div class="empty">Loading...</div></div>

  <h2>Portfolio History</h2>
  <div class="panel" id="history"><div class="empty">Loading...</div></div>

  <p class="disclaimer">AI-generated analysis. Not financial advice. Consult a SEBI-registered advisor before investing.</p>
</div>
<script>
var COLORS=["#3b82f6","#22c55e","#f59e0b","#ef4444","#a78bfa","#64748b","#ec4899","#14b8a6"];
function fmt(n){if(n==null)return"N/A";return"₹"+Number(n).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:0})}
function pct(n){if(n==null)return"";var s=n>=0?"+":"";return s+n.toFixed(1)+"%"}

function renderKPIs(d){
  var el=document.getElementById("kpis");
  if(!d||!d.snapshot){el.innerHTML='<div class="empty">No portfolio data</div>';return}
  var s=d.snapshot,pnl=d.total_pnl||0,pnlp=d.total_pnl_pct||0;
  var cls=pnl>=0?"green":"red",sign=pnl>=0?"+":"";
  el.innerHTML=
    '<div class="kpi"><div class="kpi-label">Total Value</div><div class="kpi-value">'+fmt(s.total_value)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-value '+cls+'">'+sign+fmt(pnl)+'</div><div class="kpi-sub '+cls+'">'+pct(pnlp)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Holdings</div><div class="kpi-value">'+(d.holdings_count||0)+'</div></div>'+
    '<div class="kpi"><div class="kpi-label">Last Sync</div><div class="kpi-value" style="font-size:14px">'+(s.snapshot_date||"never")+'</div></div>';
}

function renderAllocation(d){
  var el=document.getElementById("allocation");
  var alloc=d&&d.allocation?d.allocation:{};
  var keys=Object.keys(alloc);
  if(!keys.length){el.innerHTML='<div class="empty">No allocation data</div>';return}
  var total=0;keys.forEach(function(k){total+=alloc[k]});
  var h="";keys.sort(function(a,b){return alloc[b]-alloc[a]});
  keys.forEach(function(k,i){
    var p=alloc[k],w=Math.max(p,1);
    var val=d.snapshot?d.snapshot.total_value*p/100:0;
    h+='<div class="alloc-row"><span class="alloc-label">'+k.toUpperCase()+'</span>'+
       '<div style="flex:1;background:#0f172a;border-radius:4px;height:20px"><div class="alloc-bar" style="width:'+w+'%;background:'+COLORS[i%COLORS.length]+'"></div></div>'+
       '<span class="alloc-pct">'+p.toFixed(1)+'%</span>'+
       '<span class="alloc-val">'+fmt(val)+'</span></div>';
  });
  el.innerHTML=h;
}

function renderFire(d){
  var el=document.getElementById("fire");
  if(!d||!d.fire_config||!d.fire_config.target_corpus){el.innerHTML='<div class="empty">FIRE not configured. Use /fire config to set up.</div>';return}
  var f=d.fire_config,tv=d.snapshot?d.snapshot.total_value:0,pct=f.target_corpus>0?tv/f.target_corpus*100:0;
  pct=Math.min(pct,100);
  el.innerHTML=
    '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>'+fmt(tv)+'</span><span>Target: '+fmt(f.target_corpus)+'</span></div>'+
    '<div class="fire-bar-bg"><div class="fire-bar-fill" style="width:'+pct+'%"></div><div class="fire-bar-text">'+pct.toFixed(1)+'%</div></div>'+
    '<div style="font-size:12px;color:#64748b;margin-top:8px">Withdrawal rate: '+(f.withdrawal_rate*100).toFixed(0)+'% · Expected return: '+(f.expected_return*100).toFixed(0)+'% · Inflation: '+(f.inflation_rate*100).toFixed(0)+'%</div>';
}

function renderHoldings(d){
  var el=document.getElementById("holdings");
  var h=d&&d.holdings?d.holdings:[];
  if(!h.length){el.innerHTML='<div class="empty">No holdings. Use /holdings add to get started.</div>';return}
  var html='<table><thead><tr><th>Symbol</th><th>Class</th><th>Qty</th><th>Avg Price</th><th>Current</th><th>Value</th><th>P&L</th><th>Source</th></tr></thead><tbody>';
  h.forEach(function(r){
    var pnl=r.pnl||0,cls=pnl>=0?"green":"red",sign=pnl>=0?"+":"";
    html+='<tr><td><strong>'+r.symbol+'</strong></td><td>'+r.asset_class.toUpperCase()+'</td><td>'+r.quantity.toFixed(2)+'</td><td>'+fmt(r.avg_price)+'</td><td>'+(r.current_price?fmt(r.current_price):"—")+'</td><td>'+fmt(r.current_value)+'</td><td class="'+cls+'">'+sign+fmt(pnl)+'</td><td>'+r.source+'</td></tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

function renderHistory(d){
  var el=document.getElementById("history");
  var s=d&&d.snapshots?d.snapshots:[];
  if(s.length<2){el.innerHTML='<div class="empty">Need more snapshots for history chart. Data builds over time.</div>';return}
  var html='<table><thead><tr><th>Date</th><th>Value</th><th>Equity</th><th>MF</th><th>Gold</th><th>Debt</th></tr></thead><tbody>';
  s.forEach(function(r){
    html+='<tr><td>'+r.date+'</td><td>'+fmt(r.total_value)+'</td><td>'+fmt(r.equity_value)+'</td><td>'+fmt(r.mf_value)+'</td><td>'+fmt(r.gold_value)+'</td><td>'+fmt(r.debt_value)+'</td></tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

async function poll(){
  try{
    var r=await fetch("/api/finance");var d=await r.json();
    renderKPIs(d);renderAllocation(d);renderFire(d);renderHoldings(d);renderHistory(d);
    document.getElementById("lastUpdated").textContent="Updated: "+new Date().toLocaleTimeString();
  }catch(e){document.getElementById("lastUpdated").textContent="disconnected"}
}
poll();setInterval(poll,30000);
</script>
</body>
</html>
