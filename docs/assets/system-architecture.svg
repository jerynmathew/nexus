<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <linearGradient id="civitas-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="presidium-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="700" rx="12" fill="#161b22"/>

  <!-- Background -->
  <rect width="900" height="700" fill="#161b22" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#c9d1d9">Nexus — System Architecture</text>

  <!-- ═══ HOMELAB BOUNDARY ═══ -->
  <rect x="16" y="42" width="868" height="570" rx="10" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="32" y="62" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="1">YOUR HOMELAB — everything inside this box runs on your hardware</text>

  <!-- ═══ TRANSPORTS (left column) ═══ -->
  <rect x="32" y="80" width="120" height="200" rx="8" fill="#161b22" stroke="#D1D5DB" stroke-width="1"/>
  <text x="92" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#8b949e">Transports</text>

  <rect x="44" y="112" width="96" height="28" rx="4" fill="#8b949e"/>
  <text x="92" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#161b22">Telegram</text>

  <rect x="44" y="146" width="96" height="28" rx="4" fill="#8b949e"/>
  <text x="92" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">Discord</text>

  <rect x="44" y="180" width="96" height="28" rx="4" fill="#8b949e"/>
  <text x="92" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">Slack</text>

  <rect x="44" y="214" width="96" height="28" rx="4" fill="#8b949e"/>
  <text x="92" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">CLI</text>

  <text x="92" y="264" text-anchor="middle" font-size="9" fill="#6e7681">BaseTransport</text>
  <text x="92" y="275" text-anchor="middle" font-size="9" fill="#6e7681">protocol</text>

  <!-- Arrow transport → nexus core -->
  <line x1="152" y1="170" x2="186" y2="170" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="169" y="162" text-anchor="middle" font-size="8" fill="#8b949e">InboundMsg</text>

  <!-- ═══ NEXUS CORE ═══ -->
  <rect x="190" y="80" width="420" height="380" rx="10" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">NEXUS</text>

  <!-- Civitas Runtime -->
  <rect x="206" y="110" width="388" height="40" rx="6" fill="url(#civitas-grad)"/>
  <text x="400" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#0d1117">Civitas Runtime — Supervision · MessageBus · Transport · OTEL</text>
  <text x="400" y="142" text-anchor="middle" font-size="9" fill="#1c2333">crash recovery · backoff · restart counts · observability</text>

  <!-- Presidium Governance -->
  <rect x="206" y="156" width="388" height="32" rx="6" fill="url(#presidium-grad)"/>
  <text x="400" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Presidium Governance — Policy · Trust · Audit · Credentials</text>

  <!-- Supervision Tree -->
  <rect x="210" y="198" width="392" height="252" rx="6" fill="#1c2333" stroke="#79c0ff" stroke-width="1"/>
  <text x="406" y="216" text-anchor="middle" font-size="11" font-weight="700" fill="#58a6ff">Supervision Tree</text>

  <!-- Root supervisor label -->
  <text x="220" y="234" font-size="9" fill="#58a6ff" font-weight="600">root (ONE_FOR_ALL)</text>

  <!-- ConversationManager -->
  <rect x="220" y="242" width="170" height="44" rx="4" fill="#58a6ff"/>
  <text x="305" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">ConversationManager</text>
  <text x="305" y="276" text-anchor="middle" font-size="8" fill="#1c2333">routing · sessions · LLM · persona</text>

  <!-- Memory Agent -->
  <rect x="220" y="294" width="170" height="36" rx="4" fill="#58a6ff"/>
  <text x="305" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">MemoryAgent</text>

  <!-- Scheduler -->
  <rect x="220" y="338" width="170" height="36" rx="4" fill="#58a6ff"/>
  <text x="305" y="360" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">SchedulerAgent</text>

  <!-- Integrations supervisor -->
  <rect x="400" y="238" width="194" height="136" rx="6" fill="#1c2333" stroke="#79c0ff" stroke-width="1"/>
  <text x="497" y="254" text-anchor="middle" font-size="9" font-weight="600" fill="#58a6ff">integrations (ONE_FOR_ONE)</text>

  <!-- MCP agents -->
  <rect x="410" y="264" width="86" height="26" rx="3" fill="#56d364"/>
  <text x="453" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Gmail (MCP)</text>

  <rect x="502" y="264" width="86" height="26" rx="3" fill="#56d364"/>
  <text x="545" y="281" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Calendar (MCP)</text>

  <rect x="410" y="296" width="86" height="26" rx="3" fill="#56d364"/>
  <text x="453" y="313" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Drive (MCP)</text>

  <rect x="502" y="296" width="86" height="26" rx="3" fill="#3fb950"/>
  <text x="545" y="313" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Search (MCP)</text>

  <!-- Custom agents -->
  <rect x="410" y="328" width="86" height="26" rx="3" fill="#e3b341"/>
  <text x="453" y="345" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Jellyfin</text>

  <rect x="502" y="328" width="86" height="26" rx="3" fill="#e3b341"/>
  <text x="545" y="345" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Paperless</text>

  <!-- Briefing supervisor -->
  <rect x="400" y="382" width="194" height="58" rx="6" fill="#1c2333" stroke="#79c0ff" stroke-width="1"/>
  <text x="497" y="398" text-anchor="middle" font-size="9" font-weight="600" fill="#58a6ff">briefing (ONE_FOR_ONE)</text>

  <rect x="410" y="406" width="50" height="22" rx="3" fill="#6366F1"/>
  <text x="435" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#0d1117">email</text>

  <rect x="466" y="406" width="50" height="22" rx="3" fill="#6366F1"/>
  <text x="491" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#0d1117">cal</text>

  <rect x="522" y="406" width="50" height="22" rx="3" fill="#6366F1"/>
  <text x="547" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#0d1117">tasks</text>

  <!-- ═══ PERSONAS (below core) ═══ -->
  <rect x="190" y="468" width="130" height="50" rx="6" fill="#3b2e1a" stroke="#e3b341" stroke-width="1"/>
  <text x="255" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#d29922">Personas</text>
  <text x="255" y="506" text-anchor="middle" font-size="8" fill="#d29922">SOUL.md · USER.md</text>

  <!-- Memory store -->
  <rect x="335" y="468" width="130" height="50" rx="6" fill="#161b22" stroke="#D1D5DB" stroke-width="1"/>
  <text x="400" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#8b949e">SQLite (aiosqlite)</text>
  <text x="400" y="506" text-anchor="middle" font-size="8" fill="#8b949e">memory · sessions · config</text>

  <!-- Audit trail -->
  <rect x="480" y="468" width="130" height="50" rx="6" fill="#2a1c33" stroke="#bc8cff" stroke-width="1"/>
  <text x="545" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#bc8cff">Audit Trail</text>
  <text x="545" y="506" text-anchor="middle" font-size="8" fill="#bc8cff">JSONL · signed · exportable</text>

  <!-- ═══ MCP SIDECARS (right column) ═══ -->
  <rect x="640" y="80" width="230" height="200" rx="8" fill="#F0FDF4" stroke="#56d364" stroke-width="1.5"/>
  <text x="755" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#3fb950">MCP Sidecars (Docker)</text>

  <rect x="652" y="112" width="206" height="28" rx="4" fill="#56d364"/>
  <text x="755" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Google Workspace MCP</text>

  <rect x="652" y="146" width="206" height="28" rx="4" fill="#3fb950"/>
  <text x="755" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Brave Search MCP</text>

  <rect x="652" y="180" width="206" height="28" rx="4" fill="#3fb950"/>
  <text x="755" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Slack MCP (optional)</text>

  <rect x="652" y="214" width="206" height="28" rx="4" fill="#3fb950"/>
  <text x="755" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#1c3a2a">Finance MCP (optional)</text>

  <text x="755" y="264" text-anchor="middle" font-size="9" fill="#8b949e">Each sidecar is independent.</text>
  <text x="755" y="276" text-anchor="middle" font-size="9" fill="#8b949e">Crash recovery via Docker restart.</text>

  <!-- Arrow MCP → nexus -->
  <line x1="640" y1="170" x2="610" y2="170" stroke="#56d364" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ HOMELAB SERVICES (right column lower) ═══ -->
  <rect x="640" y="300" width="230" height="140" rx="8" fill="#3b2e1a" stroke="#e3b341" stroke-width="1"/>
  <text x="755" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#d29922">Homelab Services</text>

  <rect x="652" y="334" width="100" height="28" rx="4" fill="#e3b341"/>
  <text x="702" y="352" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Jellyfin</text>

  <rect x="758" y="334" width="100" height="28" rx="4" fill="#e3b341"/>
  <text x="808" y="352" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Paperless</text>

  <rect x="652" y="368" width="100" height="28" rx="4" fill="#d29922"/>
  <text x="702" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Immich</text>

  <rect x="758" y="368" width="100" height="28" rx="4" fill="#d29922"/>
  <text x="808" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">Ollama</text>

  <text x="755" y="422" text-anchor="middle" font-size="9" fill="#8b949e">REST APIs on your LAN</text>

  <!-- Arrow homelab → nexus -->
  <line x1="640" y1="370" x2="610" y2="340" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ EXTERNAL APIS (bottom) ═══ -->
  <rect x="190" y="538" width="420" height="60" rx="8" fill="#3b1c1c" stroke="#f85149" stroke-width="1"/>
  <text x="400" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#f85149">External APIs (only outbound calls)</text>
  <text x="400" y="580" text-anchor="middle" font-size="10" fill="#f85149">Claude / GPT / Gemini · Google APIs · Brave Search</text>

  <!-- Arrow nexus → external -->
  <line x1="400" y1="520" x2="400" y2="538" stroke="#f85149" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="532" font-size="8" fill="#f85149">LLM + API calls only</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="16" y="624" width="868" height="64" rx="8" fill="#161b22" stroke="#1c2333" stroke-width="1"/>
  <text x="32" y="644" font-size="10" font-weight="700" fill="#8b949e">Legend</text>

  <rect x="32" y="654" width="12" height="12" rx="2" fill="#58a6ff"/>
  <text x="50" y="665" font-size="9" fill="#8b949e"><tspan font-weight="600">Civitas</tspan> — runtime agents</text>

  <rect x="190" y="654" width="12" height="12" rx="2" fill="#bc8cff"/>
  <text x="208" y="665" font-size="9" fill="#8b949e"><tspan font-weight="600">Presidium</tspan> — governance</text>

  <rect x="340" y="654" width="12" height="12" rx="2" fill="#56d364"/>
  <text x="358" y="665" font-size="9" fill="#8b949e"><tspan font-weight="600">MCP</tspan> — standard protocol integrations</text>

  <rect x="540" y="654" width="12" height="12" rx="2" fill="#e3b341"/>
  <text x="558" y="665" font-size="9" fill="#8b949e"><tspan font-weight="600">Custom</tspan> — IntegrationAgent (REST APIs)</text>

  <rect x="740" y="654" width="12" height="12" rx="2" fill="#f85149"/>
  <text x="758" y="665" font-size="9" fill="#8b949e"><tspan font-weight="600">External</tspan> — leaves your network</text>
</svg>
