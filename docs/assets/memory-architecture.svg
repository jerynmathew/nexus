<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="m" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#8b949e"/>
    </marker>
    <marker id="m-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="920" height="540" rx="12" fill="#161b22"/>

  <rect width="920" height="540" fill="#161b22" rx="8"/>
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#c9d1d9">Nexus — Three-Layer Memory Architecture</text>

  <!-- ═══ LAYER 1: SESSION (EPISODIC) ═══ -->
  <rect x="24" y="50" width="280" height="280" rx="10" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="164" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">Session Memory</text>
  <text x="164" y="90" text-anchor="middle" font-size="10" fill="#58a6ff">Episodic — "What happened?"</text>

  <rect x="36" y="104" width="256" height="28" rx="4" fill="#58a6ff"/>
  <text x="164" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">conversations per session</text>

  <rect x="36" y="140" width="256" height="68" rx="4" fill="#0d1117" stroke="#79c0ff" stroke-width="1"/>
  <text x="44" y="158" font-size="9" font-weight="600" fill="#8b949e">Storage: SQLite (aiosqlite)</text>
  <text x="44" y="174" font-size="9" fill="#8b949e">tables: sessions, messages</text>
  <text x="44" y="190" font-size="9" fill="#8b949e">per-tenant namespaced</text>
  <text x="44" y="202" font-size="9" fill="#8b949e">checkpointed after each turn</text>

  <rect x="36" y="218" width="256" height="50" rx="4" fill="#0d1117" stroke="#79c0ff" stroke-width="1"/>
  <text x="44" y="236" font-size="9" font-weight="600" fill="#8b949e">Lifecycle:</text>
  <text x="44" y="252" font-size="9" fill="#8b949e">active → idle 30min → expired</text>
  <text x="44" y="264" font-size="9" fill="#8b949e">→ LLM summarizes → stored in Layer 2</text>

  <rect x="36" y="278" width="256" height="40" rx="4" fill="#1c2333"/>
  <text x="164" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#58a6ff">Survives agent restarts</text>
  <text x="164" y="310" text-anchor="middle" font-size="8" fill="#58a6ff">via MemoryAgent checkpoint</text>

  <!-- ═══ LAYER 2: PERSISTENT (SEMANTIC) ═══ -->
  <rect x="320" y="50" width="280" height="280" rx="10" fill="#F0FDF4" stroke="#56d364" stroke-width="1.5"/>
  <text x="460" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#3fb950">Persistent Memory</text>
  <text x="460" y="90" text-anchor="middle" font-size="10" fill="#3fb950">Semantic — "Who are you?"</text>

  <rect x="332" y="104" width="256" height="28" rx="4" fill="#56d364"/>
  <text x="460" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">facts, preferences, contacts</text>

  <rect x="332" y="140" width="256" height="68" rx="4" fill="#0d1117" stroke="#6EE7B7" stroke-width="1"/>
  <text x="340" y="158" font-size="9" font-weight="600" fill="#8b949e">Storage: SQLite memories table</text>
  <text x="340" y="174" font-size="9" fill="#8b949e">namespace: facts | preferences | contacts</text>
  <text x="340" y="190" font-size="9" fill="#8b949e">source: user_stated | inferred | system</text>
  <text x="340" y="202" font-size="9" fill="#8b949e">confidence: 1.0 (stated) → 0.5 (inferred)</text>

  <rect x="332" y="218" width="256" height="50" rx="4" fill="#0d1117" stroke="#6EE7B7" stroke-width="1"/>
  <text x="340" y="236" font-size="9" font-weight="600" fill="#8b949e">Search: FTS5 full-text index</text>
  <text x="340" y="252" font-size="9" fill="#8b949e">retrieve-on-demand per query</text>
  <text x="340" y="264" font-size="9" fill="#8b949e">NOT context-packed (prevents bloat)</text>

  <rect x="332" y="278" width="256" height="40" rx="4" fill="#1c3a2a"/>
  <text x="460" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#3fb950">Injected into system prompt</text>
  <text x="460" y="310" text-anchor="middle" font-size="8" fill="#3fb950">"I'm vegetarian" · "Boss is Sarah"</text>

  <!-- ═══ LAYER 3: SKILL (PROCEDURAL) ═══ -->
  <rect x="616" y="50" width="280" height="280" rx="10" fill="#3b2e1a" stroke="#e3b341" stroke-width="1.5"/>
  <text x="756" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#d29922">Skill Memory</text>
  <text x="756" y="90" text-anchor="middle" font-size="10" fill="#d29922">Procedural — "How do I do X?"</text>

  <rect x="628" y="104" width="256" height="28" rx="4" fill="#e3b341"/>
  <text x="756" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">learned procedures + workflows</text>

  <rect x="628" y="140" width="256" height="68" rx="4" fill="#0d1117" stroke="#FCD34D" stroke-width="1"/>
  <text x="636" y="158" font-size="9" font-weight="600" fill="#8b949e">Storage: SKILL.md files</text>
  <text x="636" y="174" font-size="9" fill="#8b949e">~/.nexus/skills/&lt;skill&gt;/SKILL.md</text>
  <text x="636" y="190" font-size="9" fill="#8b949e">markdown — human-readable, git-trackable</text>
  <text x="636" y="202" font-size="9" fill="#8b949e">auditable by Presidium governance</text>

  <rect x="628" y="218" width="256" height="50" rx="4" fill="#0d1117" stroke="#FCD34D" stroke-width="1"/>
  <text x="636" y="236" font-size="9" font-weight="600" fill="#8b949e">Creation loop:</text>
  <text x="636" y="252" font-size="9" fill="#8b949e">complex task → post-task reflection</text>
  <text x="636" y="264" font-size="9" fill="#8b949e">→ skill synthesis → approval gate → saved</text>

  <rect x="628" y="278" width="256" height="40" rx="4" fill="#3b2e1a"/>
  <text x="756" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#d29922">Self-improving</text>
  <text x="756" y="310" text-anchor="middle" font-size="8" fill="#d29922">Skills refined during subsequent use</text>

  <!-- ═══ CONSOLIDATION FLOW ═══ -->
  <rect x="24" y="346" width="872" height="80" rx="8" fill="#161b22" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="460" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#8b949e">Dream Consolidation (async, non-blocking)</text>

  <!-- Flow arrows -->
  <rect x="40" y="380" width="160" height="30" rx="4" fill="#58a6ff"/>
  <text x="120" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Session expires (30min)</text>

  <line x1="200" y1="395" x2="236" y2="395" stroke="#8b949e" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="240" y="380" width="140" height="30" rx="4" fill="#6366F1"/>
  <text x="310" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">LLM summarizes</text>

  <line x1="380" y1="395" x2="416" y2="395" stroke="#8b949e" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="420" y="380" width="140" height="30" rx="4" fill="#56d364"/>
  <text x="490" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">→ conversations table</text>

  <line x1="560" y1="395" x2="596" y2="395" stroke="#8b949e" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="600" y="380" width="140" height="30" rx="4" fill="#56d364"/>
  <text x="670" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">Extract facts →</text>

  <line x1="740" y1="395" x2="776" y2="395" stroke="#8b949e" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="780" y="380" width="100" height="30" rx="4" fill="#56d364"/>
  <text x="830" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#0d1117">memories table</text>

  <!-- ═══ CONTEXT INJECTION ═══ -->
  <rect x="24" y="440" width="872" height="86" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1"/>
  <text x="40" y="462" font-size="11" font-weight="700" fill="#58a6ff">System Prompt Assembly (per request)</text>

  <rect x="40" y="474" width="130" height="40" rx="4" fill="#3b2e1a" stroke="#e3b341" stroke-width="1"/>
  <text x="105" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#d29922">SOUL.md</text>
  <text x="105" y="506" text-anchor="middle" font-size="8" fill="#d29922">persona identity</text>

  <text x="180" y="498" font-size="14" fill="#8b949e">+</text>

  <rect x="196" y="474" width="130" height="40" rx="4" fill="#161b22" stroke="#D1D5DB" stroke-width="1"/>
  <text x="261" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#8b949e">USER.md</text>
  <text x="261" y="506" text-anchor="middle" font-size="8" fill="#8b949e">user preferences</text>

  <text x="336" y="498" font-size="14" fill="#8b949e">+</text>

  <rect x="352" y="474" width="150" height="40" rx="4" fill="#1c3a2a" stroke="#56d364" stroke-width="1"/>
  <text x="427" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#3fb950">FTS5 search results</text>
  <text x="427" y="506" text-anchor="middle" font-size="8" fill="#3fb950">relevant memories</text>

  <text x="512" y="498" font-size="14" fill="#8b949e">+</text>

  <rect x="528" y="474" width="130" height="40" rx="4" fill="#3b2e1a" stroke="#e3b341" stroke-width="1"/>
  <text x="593" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#d29922">Relevant skills</text>
  <text x="593" y="506" text-anchor="middle" font-size="8" fill="#d29922">loaded on-demand</text>

  <text x="668" y="498" font-size="14" fill="#8b949e">+</text>

  <rect x="684" y="474" width="130" height="40" rx="4" fill="#1c2333" stroke="#79c0ff" stroke-width="1"/>
  <text x="749" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#58a6ff">Recent history</text>
  <text x="749" y="506" text-anchor="middle" font-size="8" fill="#58a6ff">last N messages</text>

  <text x="830" y="498" font-size="14" fill="#8b949e">=</text>

  <rect x="846" y="474" width="42" height="40" rx="4" fill="#58a6ff"/>
  <text x="867" y="498" text-anchor="middle" font-size="9" font-weight="700" fill="#0d1117">LLM</text>
</svg>
