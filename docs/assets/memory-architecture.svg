<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="m" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#6B7280"/>
    </marker>
    <marker id="m-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect width="920" height="540" fill="#F9FAFB" rx="8"/>
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1F2937">Nexus — Three-Layer Memory Architecture</text>

  <!-- ═══ LAYER 1: SESSION (EPISODIC) ═══ -->
  <rect x="24" y="50" width="280" height="280" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="164" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Session Memory</text>
  <text x="164" y="90" text-anchor="middle" font-size="10" fill="#3B82F6">Episodic — "What happened?"</text>

  <rect x="36" y="104" width="256" height="28" rx="4" fill="#3B82F6"/>
  <text x="164" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">conversations per session</text>

  <rect x="36" y="140" width="256" height="68" rx="4" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1"/>
  <text x="44" y="158" font-size="9" font-weight="600" fill="#374151">Storage: SQLite (aiosqlite)</text>
  <text x="44" y="174" font-size="9" fill="#6B7280">tables: sessions, messages</text>
  <text x="44" y="190" font-size="9" fill="#6B7280">per-tenant namespaced</text>
  <text x="44" y="202" font-size="9" fill="#6B7280">checkpointed after each turn</text>

  <rect x="36" y="218" width="256" height="50" rx="4" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1"/>
  <text x="44" y="236" font-size="9" font-weight="600" fill="#374151">Lifecycle:</text>
  <text x="44" y="252" font-size="9" fill="#6B7280">active → idle 30min → expired</text>
  <text x="44" y="264" font-size="9" fill="#6B7280">→ LLM summarizes → stored in Layer 2</text>

  <rect x="36" y="278" width="256" height="40" rx="4" fill="#DBEAFE"/>
  <text x="164" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Survives agent restarts</text>
  <text x="164" y="310" text-anchor="middle" font-size="8" fill="#1E40AF">via MemoryAgent checkpoint</text>

  <!-- ═══ LAYER 2: PERSISTENT (SEMANTIC) ═══ -->
  <rect x="320" y="50" width="280" height="280" rx="10" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="460" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Persistent Memory</text>
  <text x="460" y="90" text-anchor="middle" font-size="10" fill="#059669">Semantic — "Who are you?"</text>

  <rect x="332" y="104" width="256" height="28" rx="4" fill="#10B981"/>
  <text x="460" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">facts, preferences, contacts</text>

  <rect x="332" y="140" width="256" height="68" rx="4" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1"/>
  <text x="340" y="158" font-size="9" font-weight="600" fill="#374151">Storage: SQLite memories table</text>
  <text x="340" y="174" font-size="9" fill="#6B7280">namespace: facts | preferences | contacts</text>
  <text x="340" y="190" font-size="9" fill="#6B7280">source: user_stated | inferred | system</text>
  <text x="340" y="202" font-size="9" fill="#6B7280">confidence: 1.0 (stated) → 0.5 (inferred)</text>

  <rect x="332" y="218" width="256" height="50" rx="4" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1"/>
  <text x="340" y="236" font-size="9" font-weight="600" fill="#374151">Search: FTS5 full-text index</text>
  <text x="340" y="252" font-size="9" fill="#6B7280">retrieve-on-demand per query</text>
  <text x="340" y="264" font-size="9" fill="#6B7280">NOT context-packed (prevents bloat)</text>

  <rect x="332" y="278" width="256" height="40" rx="4" fill="#D1FAE5"/>
  <text x="460" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">Injected into system prompt</text>
  <text x="460" y="310" text-anchor="middle" font-size="8" fill="#065F46">"I'm vegetarian" · "Boss is Sarah"</text>

  <!-- ═══ LAYER 3: SKILL (PROCEDURAL) ═══ -->
  <rect x="616" y="50" width="280" height="280" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="756" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Skill Memory</text>
  <text x="756" y="90" text-anchor="middle" font-size="10" fill="#B45309">Procedural — "How do I do X?"</text>

  <rect x="628" y="104" width="256" height="28" rx="4" fill="#F59E0B"/>
  <text x="756" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">learned procedures + workflows</text>

  <rect x="628" y="140" width="256" height="68" rx="4" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="636" y="158" font-size="9" font-weight="600" fill="#374151">Storage: SKILL.md files</text>
  <text x="636" y="174" font-size="9" fill="#6B7280">~/.nexus/skills/&lt;skill&gt;/SKILL.md</text>
  <text x="636" y="190" font-size="9" fill="#6B7280">markdown — human-readable, git-trackable</text>
  <text x="636" y="202" font-size="9" fill="#6B7280">auditable by Presidium governance</text>

  <rect x="628" y="218" width="256" height="50" rx="4" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1"/>
  <text x="636" y="236" font-size="9" font-weight="600" fill="#374151">Creation loop:</text>
  <text x="636" y="252" font-size="9" fill="#6B7280">complex task → post-task reflection</text>
  <text x="636" y="264" font-size="9" fill="#6B7280">→ skill synthesis → approval gate → saved</text>

  <rect x="628" y="278" width="256" height="40" rx="4" fill="#FEF3C7"/>
  <text x="756" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Self-improving</text>
  <text x="756" y="310" text-anchor="middle" font-size="8" fill="#92400E">Skills refined during subsequent use</text>

  <!-- ═══ CONSOLIDATION FLOW ═══ -->
  <rect x="24" y="346" width="872" height="80" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="460" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Dream Consolidation (async, non-blocking)</text>

  <!-- Flow arrows -->
  <rect x="40" y="380" width="160" height="30" rx="4" fill="#3B82F6"/>
  <text x="120" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Session expires (30min)</text>

  <line x1="200" y1="395" x2="236" y2="395" stroke="#6B7280" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="240" y="380" width="140" height="30" rx="4" fill="#6366F1"/>
  <text x="310" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">LLM summarizes</text>

  <line x1="380" y1="395" x2="416" y2="395" stroke="#6B7280" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="420" y="380" width="140" height="30" rx="4" fill="#10B981"/>
  <text x="490" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">→ conversations table</text>

  <line x1="560" y1="395" x2="596" y2="395" stroke="#6B7280" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="600" y="380" width="140" height="30" rx="4" fill="#10B981"/>
  <text x="670" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Extract facts →</text>

  <line x1="740" y1="395" x2="776" y2="395" stroke="#6B7280" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="780" y="380" width="100" height="30" rx="4" fill="#10B981"/>
  <text x="830" y="399" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">memories table</text>

  <!-- ═══ CONTEXT INJECTION ═══ -->
  <rect x="24" y="440" width="872" height="86" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="40" y="462" font-size="11" font-weight="700" fill="#1D4ED8">System Prompt Assembly (per request)</text>

  <rect x="40" y="474" width="130" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="105" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">SOUL.md</text>
  <text x="105" y="506" text-anchor="middle" font-size="8" fill="#92400E">persona identity</text>

  <text x="180" y="498" font-size="14" fill="#6B7280">+</text>

  <rect x="196" y="474" width="130" height="40" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="261" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">USER.md</text>
  <text x="261" y="506" text-anchor="middle" font-size="8" fill="#6B7280">user preferences</text>

  <text x="336" y="498" font-size="14" fill="#6B7280">+</text>

  <rect x="352" y="474" width="150" height="40" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="427" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">FTS5 search results</text>
  <text x="427" y="506" text-anchor="middle" font-size="8" fill="#065F46">relevant memories</text>

  <text x="512" y="498" font-size="14" fill="#6B7280">+</text>

  <rect x="528" y="474" width="130" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="593" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Relevant skills</text>
  <text x="593" y="506" text-anchor="middle" font-size="8" fill="#92400E">loaded on-demand</text>

  <text x="668" y="498" font-size="14" fill="#6B7280">+</text>

  <rect x="684" y="474" width="130" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="749" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Recent history</text>
  <text x="749" y="506" text-anchor="middle" font-size="8" fill="#1E40AF">last N messages</text>

  <text x="830" y="498" font-size="14" fill="#6B7280">=</text>

  <rect x="846" y="474" width="42" height="40" rx="4" fill="#1D4ED8"/>
  <text x="867" y="498" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">LLM</text>
</svg>
