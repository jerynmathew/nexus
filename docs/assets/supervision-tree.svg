<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="560" fill="#F9FAFB" rx="8"/>
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1F2937">Nexus — Supervision Tree</text>

  <!-- ═══ ROOT SUPERVISOR ═══ -->
  <rect x="260" y="46" width="400" height="42" rx="8" fill="#1D4ED8"/>
  <text x="460" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">nexus (root_supervisor)</text>
  <text x="460" y="80" text-anchor="middle" font-size="9" fill="#BFDBFE">strategy: ONE_FOR_ALL · max_restarts: 5 · window: 60s</text>

  <!-- Horizontal connector -->
  <line x1="100" y1="88" x2="820" y2="88" stroke="#6B7280" stroke-width="1.5"/>

  <!-- Vertical lines to children -->
  <line x1="100" y1="88" x2="100" y2="116" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="290" y1="88" x2="290" y2="116" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="460" y1="88" x2="460" y2="116" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="630" y1="88" x2="630" y2="116" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="820" y1="88" x2="820" y2="116" stroke="#6B7280" stroke-width="1.5"/>

  <!-- ═══ CONVERSATION MANAGER ═══ -->
  <rect x="24" y="116" width="152" height="90" rx="6" fill="#3B82F6"/>
  <text x="100" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">ConversationManager</text>
  <text x="100" y="152" text-anchor="middle" font-size="8" fill="#DBEAFE">AgentProcess</text>
  <line x1="36" y1="160" x2="164" y2="160" stroke="#60A5FA" stroke-width="0.5"/>
  <text x="36" y="174" font-size="8" fill="#BFDBFE">• transport routing</text>
  <text x="36" y="186" font-size="8" fill="#BFDBFE">• sessions + LLM calls</text>
  <text x="36" y="198" font-size="8" fill="#BFDBFE">• skill execution</text>

  <!-- ═══ INTEGRATIONS SUPERVISOR ═══ -->
  <rect x="192" y="116" width="196" height="42" rx="6" fill="#1E40AF"/>
  <text x="290" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">integrations</text>
  <text x="290" y="150" text-anchor="middle" font-size="9" fill="#BFDBFE">supervisor · ONE_FOR_ONE</text>

  <!-- Integration children -->
  <line x1="220" y1="158" x2="220" y2="176" stroke="#6B7280" stroke-width="1"/>
  <line x1="290" y1="158" x2="290" y2="176" stroke="#6B7280" stroke-width="1"/>
  <line x1="360" y1="158" x2="360" y2="176" stroke="#6B7280" stroke-width="1"/>
  <line x1="220" y1="158" x2="360" y2="158" stroke="#6B7280" stroke-width="1"/>

  <!-- MCP-backed box -->
  <rect x="196" y="176" width="188" height="100" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="194" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">MCP tools (via LLM tool-use)</text>

  <rect x="206" y="202" width="80" height="22" rx="3" fill="#10B981"/>
  <text x="246" y="217" text-anchor="middle" font-size="8" font-weight="600" fill="#FFFFFF">Gmail</text>
  <rect x="294" y="202" width="80" height="22" rx="3" fill="#10B981"/>
  <text x="334" y="217" text-anchor="middle" font-size="8" font-weight="600" fill="#FFFFFF">Calendar</text>
  <rect x="206" y="230" width="80" height="22" rx="3" fill="#059669"/>
  <text x="246" y="245" text-anchor="middle" font-size="8" font-weight="600" fill="#FFFFFF">Drive</text>
  <rect x="294" y="230" width="80" height="22" rx="3" fill="#059669"/>
  <text x="334" y="245" text-anchor="middle" font-size="8" font-weight="600" fill="#FFFFFF">Search</text>
  <rect x="206" y="258" width="168" height="12" rx="2" fill="#D1FAE5"/>
  <text x="290" y="268" text-anchor="middle" font-size="7" fill="#065F46">... additional MCP sidecars</text>

  <!-- Custom agents note -->
  <rect x="196" y="284" width="188" height="28" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="290" y="302" text-anchor="middle" font-size="8" fill="#92400E">Custom agents only when MCP</text>
  <text x="290" y="310" text-anchor="middle" font-size="7" fill="#92400E">doesn't cover the use case</text>

  <!-- ═══ CORE AGENTS (middle column) ═══ -->
  <rect x="404" y="116" width="112" height="56" rx="6" fill="#3B82F6"/>
  <text x="460" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">MemoryAgent</text>
  <text x="460" y="152" text-anchor="middle" font-size="8" fill="#BFDBFE">AgentProcess</text>
  <text x="460" y="166" text-anchor="middle" font-size="7" fill="#BFDBFE">aiosqlite · FTS5 · skills DB</text>

  <rect x="404" y="182" width="112" height="56" rx="6" fill="#3B82F6"/>
  <text x="460" y="204" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SchedulerAgent</text>
  <text x="460" y="218" text-anchor="middle" font-size="8" fill="#BFDBFE">AgentProcess</text>
  <text x="460" y="232" text-anchor="middle" font-size="7" fill="#BFDBFE">cron · triggers skills</text>

  <!-- ═══ MODEL ROUTER ═══ -->
  <rect x="556" y="116" width="148" height="56" rx="6" fill="#3B82F6"/>
  <text x="630" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">ModelRouter</text>
  <text x="630" y="152" text-anchor="middle" font-size="8" fill="#BFDBFE">AgentProcess</text>
  <text x="630" y="166" text-anchor="middle" font-size="7" fill="#BFDBFE">task routing · fallback chain</text>

  <!-- Routing table -->
  <rect x="556" y="182" width="148" height="74" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="564" y="196" font-size="7" fill="#1E40AF" font-weight="600">CLASSIFY → Haiku (cheap)</text>
  <text x="564" y="210" font-size="7" fill="#1E40AF" font-weight="600">FORMAT → Haiku (cheap)</text>
  <text x="564" y="224" font-size="7" fill="#1E40AF" font-weight="600">CONVERSE → Sonnet (primary)</text>
  <text x="564" y="238" font-size="7" fill="#1E40AF" font-weight="600">SKILL_EXEC → Haiku (cheap)</text>
  <text x="564" y="250" font-size="7" fill="#6B7280">fallback: primary → local → cloud</text>

  <!-- ═══ DASHBOARD SERVER ═══ -->
  <rect x="740" y="116" width="156" height="56" rx="6" fill="#7C3AED"/>
  <text x="818" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">DashboardServer</text>
  <text x="818" y="152" text-anchor="middle" font-size="8" fill="#E9D5FF">GenServer</text>
  <text x="818" y="166" text-anchor="middle" font-size="7" fill="#E9D5FF">HTTP :8080 · live topology</text>

  <!-- Dashboard endpoints -->
  <rect x="740" y="182" width="156" height="62" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="748" y="196" font-size="7" fill="#5B21B6" font-weight="600">GET / → HTML dashboard</text>
  <text x="748" y="210" font-size="7" fill="#5B21B6" font-weight="600">GET /api/topology</text>
  <text x="748" y="224" font-size="7" fill="#5B21B6" font-weight="600">GET /api/agents</text>
  <text x="748" y="238" font-size="7" fill="#5B21B6" font-weight="600">GET /api/events (SSE)</text>

  <!-- ═══ CRASH RECOVERY ═══ -->
  <rect x="24" y="336" width="872" height="110" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="40" y="358" font-size="12" font-weight="700" fill="#92400E">Crash Recovery — Why This Architecture Matters</text>

  <rect x="36" y="370" width="275" height="64" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="44" y="388" font-size="10" font-weight="700" fill="#92400E">MCP tool call fails</text>
  <text x="44" y="402" font-size="9" fill="#374151">ConvManager catches per-tool error</text>
  <text x="44" y="416" font-size="9" fill="#374151">Continues with remaining tools</text>
  <text x="44" y="428" font-size="9" fill="#10B981" font-weight="600">User: partial result, no crash</text>

  <rect x="323" y="370" width="275" height="64" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="331" y="388" font-size="10" font-weight="700" fill="#92400E">ConversationManager crashes</text>
  <text x="331" y="402" font-size="9" fill="#374151">Root ONE_FOR_ALL → restart everything</text>
  <text x="331" y="416" font-size="9" fill="#374151">Sessions restored from MemoryAgent</text>
  <text x="331" y="428" font-size="9" fill="#10B981" font-weight="600">User: brief reconnect, context preserved</text>

  <rect x="610" y="370" width="275" height="64" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
  <text x="618" y="388" font-size="10" font-weight="700" fill="#92400E">Skill execution fails mid-briefing</text>
  <text x="618" y="402" font-size="9" fill="#374151">TaskGroup catches per-chunk exception</text>
  <text x="618" y="416" font-size="9" fill="#374151">Available sections still sent</text>
  <text x="618" y="428" font-size="9" fill="#10B981" font-weight="600">User: partial briefing + "⚠ unavailable"</text>

  <!-- ═══ DESIGN PRINCIPLE ═══ -->
  <rect x="24" y="458" width="872" height="44" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="460" y="478" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Design Principle: Skills + MCP tools are the norm. Custom agents are the exception.</text>
  <text x="460" y="494" text-anchor="middle" font-size="9" fill="#065F46">Morning briefing, email triage, task management — all skills. Custom agents only for bespoke code (no MCP, custom rendering/UI).</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="24" y="514" width="872" height="36" rx="6" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="40" y="524" width="12" height="12" rx="2" fill="#3B82F6"/>
  <text x="58" y="535" font-size="9" fill="#374151"><tspan font-weight="600">AgentProcess</tspan></text>
  <rect x="160" y="524" width="12" height="12" rx="2" fill="#1E40AF"/>
  <text x="178" y="535" font-size="9" fill="#374151"><tspan font-weight="600">Supervisor</tspan></text>
  <rect x="270" y="524" width="12" height="12" rx="2" fill="#7C3AED"/>
  <text x="288" y="535" font-size="9" fill="#374151"><tspan font-weight="600">GenServer</tspan></text>
  <rect x="370" y="524" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="388" y="535" font-size="9" fill="#374151"><tspan font-weight="600">MCP tools</tspan></text>
  <rect x="470" y="524" width="12" height="12" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="488" y="535" font-size="9" fill="#374151"><tspan font-weight="600">Custom agent</tspan> (exception, not norm)</text>
</svg>
