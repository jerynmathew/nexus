<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="govGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b2e1a"/>
      <stop offset="100%" stop-color="#3b2e1a"/>
    </linearGradient>
    <linearGradient id="skillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3a2a"/>
      <stop offset="100%" stop-color="#1c3a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" rx="12" fill="#161b22"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="550" y="34" text-anchor="middle" fill="#0d1117" font-size="18" font-weight="700">M2 Wave A — Architecture: MCP + Skills + Governance</text>

  <!-- ═══════════════ User / Telegram ═══════════════ -->
  <rect x="30" y="80" width="140" height="50" rx="8" fill="#c9d1d9" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="100" text-anchor="middle" fill="#30363d" font-size="12" font-weight="600">👤 User</text>
  <text x="100" y="116" text-anchor="middle" fill="#8b949e" font-size="10">Telegram</text>

  <!-- Arrow: User → Transport -->
  <line x1="170" y1="105" x2="220" y2="105" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b949e"/></marker></defs>

  <!-- Transport -->
  <rect x="220" y="80" width="160" height="50" rx="8" fill="#c9d1d9" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="100" text-anchor="middle" fill="#30363d" font-size="12" font-weight="600">TelegramTransport</text>
  <text x="300" y="116" text-anchor="middle" fill="#8b949e" font-size="10">InboundMessage + Buttons</text>

  <!-- Arrow: Transport → ConvManager -->
  <line x1="300" y1="130" x2="300" y2="160" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ ConversationManager (central) ═══════════════ -->
  <rect x="130" y="160" width="340" height="120" rx="10" fill="#0d1117" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="130" y="160" width="340" height="28" rx="10" fill="#3b82f6"/>
  <rect x="130" y="178" width="340" height="10" fill="#3b82f6"/>
  <text x="300" y="180" text-anchor="middle" fill="#0d1117" font-size="13" font-weight="700">ConversationManager</text>

  <text x="150" y="208" fill="#30363d" font-size="10">1. Classify intent (cheap model)</text>
  <text x="150" y="224" fill="#30363d" font-size="10">2. Filter MCP tools by intent</text>
  <text x="150" y="240" fill="#30363d" font-size="10">3. Policy check → approve/deny</text>
  <text x="150" y="256" fill="#30363d" font-size="10">4. Tool-use loop → LLM + MCP</text>
  <text x="150" y="272" fill="#30363d" font-size="10">5. Execute skills (parallel/seq)</text>

  <!-- ═══════════════ LLM Client → AgentGateway ═══════════════ -->
  <rect x="520" y="80" width="180" height="70" rx="8" fill="#0d1117" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="102" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">LLMClient</text>
  <text x="610" y="118" text-anchor="middle" fill="#8b949e" font-size="10">model_for_task()</text>
  <text x="610" y="134" text-anchor="middle" fill="#8b949e" font-size="10">CLASSIFY→Haiku CONVERSE→Sonnet</text>

  <!-- Arrow: ConvManager → LLMClient -->
  <line x1="470" y1="195" x2="520" y2="115" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker></defs>

  <!-- AgentGateway -->
  <rect x="750" y="80" width="160" height="70" rx="8" fill="#2a1c33" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="102" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">AgentGateway</text>
  <text x="830" y="118" text-anchor="middle" fill="#8b949e" font-size="10">:4000 OpenAI-compat</text>
  <text x="830" y="134" text-anchor="middle" fill="#8b949e" font-size="10">Anthropic • failover</text>

  <!-- Arrow: LLMClient → AgentGateway -->
  <line x1="700" y1="115" x2="750" y2="115" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="725" y="108" text-anchor="middle" fill="#8b5cf6" font-size="9">httpx</text>

  <!-- ═══════════════ MCPManager (right side) ═══════════════ -->
  <rect x="520" y="180" width="540" height="190" rx="10" fill="url(#mcpGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="204" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700">MCPManager</text>
  <text x="790" y="220" text-anchor="middle" fill="#3b82f6" font-size="10">Multi-server • Tool filtering • Health checks • Auto-reconnect</text>

  <!-- MCP Server boxes inside MCPManager -->
  <rect x="540" y="235" width="150" height="60" rx="6" fill="#0d1117" stroke="#60a5fa" stroke-width="1"/>
  <text x="615" y="255" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">📧 Gmail MCP</text>
  <text x="615" y="270" text-anchor="middle" fill="#8b949e" font-size="9">search • read • send</text>
  <text x="615" y="283" text-anchor="middle" fill="#8b949e" font-size="9">draft • labels</text>

  <rect x="710" y="235" width="150" height="60" rx="6" fill="#0d1117" stroke="#60a5fa" stroke-width="1"/>
  <text x="785" y="255" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">📅 Calendar MCP</text>
  <text x="785" y="270" text-anchor="middle" fill="#8b949e" font-size="9">list • create • delete</text>
  <text x="785" y="283" text-anchor="middle" fill="#8b949e" font-size="9">freebusy • events</text>

  <rect x="880" y="235" width="160" height="60" rx="6" fill="#0d1117" stroke="#60a5fa" stroke-width="1"/>
  <text x="960" y="255" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🔧 Future MCP</text>
  <text x="960" y="270" text-anchor="middle" fill="#8b949e" font-size="9">Drive • Tasks • Search</text>
  <text x="960" y="283" text-anchor="middle" fill="#8b949e" font-size="9">config-driven, no code</text>

  <!-- Tool filtering label -->
  <rect x="540" y="305" width="500" height="24" rx="4" fill="#1c2333"/>
  <text x="790" y="321" text-anchor="middle" fill="#3b82f6" font-size="10">filter_tools(["gmail"]) → 5 tools (~3K tokens) instead of all 137 (~15K tokens)</text>

  <!-- MCP server container label -->
  <rect x="540" y="340" width="500" height="20" rx="4" fill="#1c2333"/>
  <text x="790" y="354" text-anchor="middle" fill="#58a6ff" font-size="10">Docker sidecar: taylorwilsdon/google_workspace_mcp • streamable HTTP • OAuth 2.1</text>

  <!-- Arrow: ConvManager → MCPManager -->
  <line x1="470" y1="240" x2="520" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <text x="495" y="233" text-anchor="middle" fill="#3b82f6" font-size="9">call_tool()</text>

  <!-- ═══════════════ Governance (bottom left) ═══════════════ -->
  <rect x="30" y="400" width="280" height="140" rx="10" fill="url(#govGrad)" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="424" text-anchor="middle" fill="#d29922" font-size="14" font-weight="700">Governance (Minimal)</text>

  <text x="50" y="448" fill="#d29922" font-size="11">📗 Read actions → auto-allowed</text>
  <text x="50" y="466" fill="#d29922" font-size="11">📙 Write actions → [Approve] [Reject]</text>
  <text x="50" y="484" fill="#d29922" font-size="11">📕 Destructive → always prompted</text>
  <text x="50" y="506" fill="#d29922" font-size="11">📝 Audit → JSONL (agent, tool, decision)</text>
  <text x="50" y="524" fill="#d29922" font-size="11">🔘 Approval via Telegram inline buttons</text>

  <!-- Arrow: ConvManager → Governance -->
  <line x1="200" y1="280" x2="170" y2="400" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <defs><marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker></defs>
  <text x="160" y="340" fill="#d97706" font-size="9">policy_check()</text>

  <!-- ═══════════════ Skill System (bottom center) ═══════════════ -->
  <rect x="340" y="400" width="320" height="180" rx="10" fill="url(#skillGrad)" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="424" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">Skill System</text>

  <!-- SkillManager -->
  <rect x="360" y="440" width="130" height="50" rx="6" fill="#0d1117" stroke="#34d399" stroke-width="1"/>
  <text x="425" y="460" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">SkillManager</text>
  <text x="425" y="475" text-anchor="middle" fill="#8b949e" font-size="9">load • index • search</text>

  <!-- SchedulerAgent -->
  <rect x="510" y="440" width="130" height="50" rx="6" fill="#0d1117" stroke="#34d399" stroke-width="1"/>
  <text x="575" y="460" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">SchedulerAgent</text>
  <text x="575" y="475" text-anchor="middle" fill="#8b949e" font-size="9">cron • croniter</text>

  <!-- SKILL.md example -->
  <rect x="360" y="500" width="280" height="70" rx="6" fill="#0d1117" stroke="#34d399" stroke-width="1"/>
  <text x="370" y="516" fill="#3fb950" font-size="10" font-weight="600">📄 morning-briefing/SKILL.md</text>
  <text x="370" y="530" fill="#8b949e" font-size="9">execution: parallel</text>
  <text x="370" y="543" fill="#8b949e" font-size="9">schedule: "0 7 * * *"</text>
  <text x="370" y="556" fill="#8b949e" font-size="9">sections: Email • Calendar • Tasks</text>
  <text x="370" y="568" fill="#8b949e" font-size="8" font-style="italic">asyncio.TaskGroup → per-section timeout</text>

  <!-- Arrow: ConvManager → SkillSystem -->
  <line x1="350" y1="280" x2="440" y2="400" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker></defs>
  <text x="420" y="340" fill="#059669" font-size="9">execute_skill()</text>

  <!-- Arrow: Scheduler → ConvManager -->
  <path d="M575,440 Q575,380 400,280" fill="none" stroke="#059669" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="530" y="365" fill="#059669" font-size="9">trigger</text>

  <!-- ═══════════════ MemoryAgent (bottom right) ═══════════════ -->
  <rect x="700" y="400" width="200" height="100" rx="10" fill="#0d1117" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="424" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="700">MemoryAgent</text>
  <text x="800" y="444" text-anchor="middle" fill="#8b949e" font-size="10">SQLite + FTS5</text>
  <text x="800" y="460" text-anchor="middle" fill="#8b949e" font-size="10">Sessions • Messages</text>
  <text x="800" y="476" text-anchor="middle" fill="#8b949e" font-size="10">Memories • Config</text>
  <text x="800" y="492" text-anchor="middle" fill="#8b949e" font-size="10">Audit log (JSONL)</text>

  <!-- Arrow: ConvManager → MemoryAgent -->
  <line x1="400" y1="280" x2="750" y2="400" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowIndigo)"/>
  <defs><marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker></defs>

  <!-- ═══════════════ Supervision label ═══════════════ -->
  <rect x="30" y="600" width="1040" height="130" rx="10" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="550" y="624" text-anchor="middle" fill="#6e7681" font-size="13" font-weight="700">Supervision Tree (ONE_FOR_ALL)</text>

  <rect x="60" y="640" width="120" height="32" rx="5" fill="#1c2333" stroke="#93c5fd"/>
  <text x="120" y="660" text-anchor="middle" fill="#58a6ff" font-size="10">memory</text>

  <rect x="210" y="640" width="180" height="32" rx="5" fill="#1c2333" stroke="#93c5fd"/>
  <text x="300" y="660" text-anchor="middle" fill="#58a6ff" font-size="10">conversation_manager</text>

  <rect x="420" y="640" width="120" height="32" rx="5" fill="#1c2333" stroke="#93c5fd"/>
  <text x="480" y="660" text-anchor="middle" fill="#58a6ff" font-size="10">scheduler</text>

  <rect x="60" y="690" width="950" height="28" rx="5" fill="#1c2333"/>
  <text x="535" y="708" text-anchor="middle" fill="#3b82f6" font-size="10">MCP servers run as Docker sidecars (independent lifecycle) — not Civitas agents. Crash recovery via docker restart policy.</text>
</svg>
