binds:
  - port: 4000
    listeners:
      - routes:
          - name: anthropic
            backends:
              - ai:
                  name: anthropic-sonnet
                  provider:
                    anthropic:
                      model: claude-sonnet-4-20250514
              - ai:
                  name: anthropic-haiku
                  provider:
                    anthropic:
                      model: claude-haiku-4-20250414
            policies:
              backendAuth:
                key: "$ANTHROPIC_API_KEY"
