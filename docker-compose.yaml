services:
  nexus:
    build: .
    container_name: nexus
    restart: unless-stopped
    depends_on:
      agentgateway:
        condition: service_started
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./personas:/app/personas:ro
      - nexus-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - nexus-net
    profiles:
      - full

  agentgateway:
    image: cr.agentgateway.dev/agentgateway:latest
    container_name: agentgateway
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "15000:15000"
    volumes:
      - ./agentgateway.yaml:/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["-f", "/config.yaml"]
    networks:
      - nexus-net

  mcp-google:
    build:
      context: https://github.com/taylorwilsdon/google_workspace_mcp.git
    container_name: mcp-google
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - mcp-google-creds:/app/store_creds
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - USER_GOOGLE_EMAIL=${GOOGLE_EMAIL}
      - TOOLS=gmail calendar tasks
      - OAUTHLIB_INSECURE_TRANSPORT=1
    networks:
      - nexus-net
    profiles:
      - google

  mcp-search:
    build:
      context: https://github.com/Aas-ee/open-webSearch.git
    container_name: mcp-search
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MODE=http
      - PORT=3000
      - DEFAULT_SEARCH_ENGINE=duckduckgo
    networks:
      - nexus-net
    profiles:
      - search

  mcp-browser:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: mcp-browser
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - nexus-net
    profiles:
      - browser

volumes:
  nexus-data:
  mcp-google-creds:

networks:
  nexus-net:
